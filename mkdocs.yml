site_name: DiffSolid
site_description: JAX-native differentiable solid mechanics and phase-field fracture
site_url: https://zclsjtu.github.io/DiffSolid/
repo_url: https://github.com/zclsjtu/DiffSolid
repo_name: DiffSolid

theme:
  name: material
  language: en
  logo: assets/diffsolid-logo.png
  favicon: assets/diffsolid-logo.png
  palette:
    - scheme: default
      primary: custom
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Dark mode
    - scheme: slate
      primary: blue grey
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - toc.follow
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mermaid2

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true
      toc_depth: 3

extra_css:
  - stylesheets/extra.css
  - https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js
  - https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js
  - javascripts/katex.js

nav:
  - Home: index.md
  - Install: install.md
  - Quick Start: quickstart.md
  - API Reference: api/index.md
  - Theory:
      - Overview: theory/index.md
      - Quasi-static mechanics: theory/formulations.md
      - Dynamic mechanics: theory/dynamic-mechanics.md
      - Phase-field fracture: theory/phase-field-fracture.md
  - Gallery:
      - Overview: gallery/index.md
      - "Story: Borden → Kalthoff GPU": gallery/kalthoff-borden-gpu.md
      - "Story: Quasi-static PF fracture": gallery/quasi-static-pf-fracture.md
      - "Story: Volumetric locking": gallery/volumetric-locking.md
      - Phase-field fracture: gallery/phase-field-fracture.md
      - Solid mechanics: gallery/solid-mechanics.md
      - GPU solvers: gallery/gpu-solvers.md
  - Legal:
      - License: legal/license.md
      - Third-Party Notices: legal/third-party.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/zclsjtu/DiffSolid
